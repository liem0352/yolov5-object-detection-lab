<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="sec-title sec-desc">
  <title id="sec-title">检测场景</title>
  <desc id="sec-desc">YOLOv5 目标检测实训覆盖街道、室内、自然与人物特写四类场景。</desc>

  <!-- 画布背景 -->
  <rect width="1200" height="140" fill="#0B0F14" rx="16"/>

  <!-- 左侧:检测框 motif + 标题 -->
  <g transform="translate(48 44)">
    <rect x="0" y="6" width="36" height="36" fill="none" stroke="#E8B547" stroke-width="1.6"/>
    <rect x="0" y="0" width="28" height="10" fill="#4A9EFF"/>
  </g>

  <text x="104" y="70" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="28" font-weight="700" fill="#E8E4D9" text-rendering="geometricPrecision">检测场景</text>
  <text x="104" y="96" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="16" fill="#9CA3AF" text-rendering="geometricPrecision">街道 - 室内 - 自然 - 人物特写,共 4 类真实场景</text>

  <!-- 右侧:场景类别标签(矩形框,无装饰 dot) -->
  <g transform="translate(756 56)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" text-rendering="geometricPrecision">
    <rect x="0" y="0" width="96" height="28" rx="4" fill="none" stroke="#E8B547" stroke-width="1"/>
    <text x="48" y="18" fill="#E8B547" text-anchor="middle">STREET</text>

    <rect x="108" y="0" width="96" height="28" rx="4" fill="none" stroke="#2A2F36" stroke-width="1"/>
    <text x="156" y="18" fill="#9CA3AF" text-anchor="middle">INDOOR</text>

    <rect x="216" y="0" width="96" height="28" rx="4" fill="none" stroke="#2A2F36" stroke-width="1"/>
    <text x="264" y="18" fill="#9CA3AF" text-anchor="middle">NATURE</text>

    <rect x="324" y="0" width="96" height="28" rx="4" fill="none" stroke="#2A2F36" stroke-width="1"/>
    <text x="372" y="18" fill="#9CA3AF" text-anchor="middle">PORTRAIT</text>
  </g>
</svg>
