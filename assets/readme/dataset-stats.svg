<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" role="img" aria-labelledby="ds-title ds-desc">
  <title id="ds-title">数据集统计</title>
  <desc id="ds-desc">本仓库 test_images 检测结果类别分布统计,基于 results/ 目录中 yolov5s 推理输出。共 6 张结果图,覆盖 10 个 COCO 类别。</desc>

  <!-- 画布背景 -->
  <rect width="1200" height="280" fill="#0B0F14" rx="20"/>

  <!-- 标题区 -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="48" y="50" font-size="26" font-weight="700" fill="#E8E4D9">数据集统计</text>
    <text x="48" y="76" font-size="15" fill="#9CA3AF">基于 results/ 目录真实检测结果的类别分布</text>
  </g>

  <!-- 左侧:类别分布水平条形图 -->
  <g transform="translate(48 110)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7280" letter-spacing="1.2">类别出现频次</text>

    <!-- 条形图(每条高 18,间距 6) -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" text-rendering="geometricPrecision">
      <!-- person x3 -->
      <text x="0" y="30" fill="#9CA3AF">person</text>
      <rect x="90" y="20" width="180" height="14" rx="2" fill="#E8B547"/>
      <text x="278" y="30" fill="#E8E4D9">3</text>

      <!-- car x1 -->
      <text x="0" y="54" fill="#9CA3AF">car</text>
      <rect x="90" y="44" width="60" height="14" rx="2" fill="#4A9EFF"/>
      <text x="158" y="54" fill="#E8E4D9">1</text>

      <!-- bus x1 -->
      <text x="0" y="78" fill="#9CA3AF">bus</text>
      <rect x="90" y="68" width="60" height="14" rx="2" fill="#4A9EFF"/>
      <text x="158" y="78" fill="#E8E4D9">1</text>

      <!-- bed x1 -->
      <text x="0" y="102" fill="#9CA3AF">bed</text>
      <rect x="90" y="92" width="60" height="14" rx="2" fill="#4A9EFF"/>
      <text x="158" y="102" fill="#E8E4D9">1</text>

      <!-- chair x1 -->
      <text x="0" y="126" fill="#9CA3AF">chair</text>
      <rect x="90" y="116" width="60" height="14" rx="2" fill="#4A9EFF"/>
      <text x="158" y="126" fill="#E8E4D9">1</text>

      <!-- tv x1 -->
      <text x="0" y="150" fill="#9CA3AF">tv</text>
      <rect x="90" y="140" width="60" height="14" rx="2" fill="#4A9EFF"/>
      <text x="158" y="150" fill="#E8E4D9">1</text>
    </g>
  </g>

  <!-- 右侧:总览统计卡 -->
  <g transform="translate(620 110)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7280" letter-spacing="1.2">总览</text>

    <!-- 卡片 1: 结果图数 -->
    <g transform="translate(0 16)">
      <rect width="160" height="64" rx="8" fill="#1A1F26" stroke="#2A2F36" stroke-width="1"/>
      <text x="16" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">结果图</text>
      <text x="16" y="52" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="26" font-weight="700" fill="#E8B547" text-rendering="geometricPrecision">6</text>
      <text x="60" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9CA3AF">张</text>
    </g>

    <!-- 卡片 2: 场景数 -->
    <g transform="translate(176 16)">
      <rect width="160" height="64" rx="8" fill="#1A1F26" stroke="#2A2F36" stroke-width="1"/>
      <text x="16" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">场景类型</text>
      <text x="16" y="52" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="26" font-weight="700" fill="#E8B547" text-rendering="geometricPrecision">4</text>
      <text x="60" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9CA3AF">类</text>
    </g>

    <!-- 卡片 3: 检测类别数 -->
    <g transform="translate(352 16)">
      <rect width="160" height="64" rx="8" fill="#1A1F26" stroke="#2A2F36" stroke-width="1"/>
      <text x="16" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">检测类别</text>
      <text x="16" y="52" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="26" font-weight="700" fill="#4A9EFF" text-rendering="geometricPrecision">9</text>
      <text x="52" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9CA3AF">/ 80 COCO</text>
    </g>

    <!-- 卡片 4: 预训练 -->
    <g transform="translate(0 96)">
      <rect width="512" height="64" rx="8" fill="#1A1F26" stroke="#2A2F36" stroke-width="1"/>
      <text x="16" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">权重来源</text>
      <text x="16" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#E8E4D9">yolov5s.pt · COCO 80 类预训练 · 未微调</text>
    </g>
  </g>
</svg>
