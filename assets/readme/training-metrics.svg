<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="met-title met-desc">
  <title id="met-title">YOLOv5s 评估指标</title>
  <desc id="met-desc">yolov5s 在 COCO val 2017 上的官方评估指标:mAP@0.5 为 56.4,mAP@0.5:0.95 为 37.4。右侧为精度-召回曲线示意。数据来自 Ultralytics 官方发布。</desc>

  <!-- 画布背景 -->
  <rect width="1200" height="320" fill="#0B0F14" rx="20"/>

  <!-- 标题区 -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="48" y="50" font-size="26" font-weight="700" fill="#E8E4D9">评估指标</text>
    <text x="48" y="76" font-size="15" fill="#9CA3AF">yolov5s 在 COCO val 2017 上的官方评估结果 · Ultralytics 发布</text>
  </g>

  <!-- 左侧:两个核心指标卡 -->
  <g transform="translate(48 110)">
    <!-- 指标卡 1: mAP@0.5 -->
    <g>
      <rect width="240" height="180" rx="10" fill="#1A1F26" stroke="#E8B547" stroke-width="1.4"/>
      <text x="20" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#E8B547" letter-spacing="1.2">MAP@0.5</text>
      <text x="20" y="96" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="56" font-weight="700" fill="#E8E4D9" text-rendering="geometricPrecision">56.4</text>
      <text x="172" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#9CA3AF">%</text>
      <line x1="20" y1="116" x2="220" y2="116" stroke="#2A2F36" stroke-width="1"/>
      <text x="20" y="140" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="13" fill="#9CA3AF">单 IoU 阈值平均精度</text>
      <text x="20" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">IoU = 0.5</text>
    </g>

    <!-- 指标卡 2: mAP@0.5:0.95 -->
    <g transform="translate(264 0)">
      <rect width="240" height="180" rx="10" fill="#1A1F26" stroke="#4A9EFF" stroke-width="1.4"/>
      <text x="20" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#4A9EFF" letter-spacing="1.2">MAP@0.5:0.95</text>
      <text x="20" y="96" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="56" font-weight="700" fill="#E8E4D9" text-rendering="geometricPrecision">37.4</text>
      <text x="172" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#9CA3AF">%</text>
      <line x1="20" y1="116" x2="220" y2="116" stroke="#2A2F36" stroke-width="1"/>
      <text x="20" y="140" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' font-size="13" fill="#9CA3AF">多 IoU 阈值平均精度</text>
      <text x="20" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">IoU = 0.5 : 0.95</text>
    </g>
  </g>

  <!-- 右侧:精度-召回曲线 -->
  <g transform="translate(600 110)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7280" letter-spacing="1.2">PRECISION - RECALL</text>

    <!-- 坐标系 -->
    <g transform="translate(0 16)">
      <!-- 网格 -->
      <g stroke="#1A1F26" stroke-width="1">
        <line x1="0" y1="0" x2="0" y2="144"/>
        <line x1="0" y1="144" x2="504" y2="144"/>
        <line x1="0" y1="0" x2="504" y2="0" opacity="0.5"/>
        <line x1="504" y1="0" x2="504" y2="144" opacity="0.5"/>
        <line x1="126" y1="0" x2="126" y2="144" stroke-dasharray="2 3" opacity="0.5"/>
        <line x1="252" y1="0" x2="252" y2="144" stroke-dasharray="2 3" opacity="0.5"/>
        <line x1="378" y1="0" x2="378" y2="144" stroke-dasharray="2 3" opacity="0.5"/>
        <line x1="0" y1="36" x2="504" y2="36" stroke-dasharray="2 3" opacity="0.5"/>
        <line x1="0" y1="72" x2="504" y2="72" stroke-dasharray="2 3" opacity="0.5"/>
        <line x1="0" y1="108" x2="504" y2="108" stroke-dasharray="2 3" opacity="0.5"/>
      </g>

      <!-- PR 曲线(典型 COCO 形态:从 (0,1) 凸降到 (1,0.3)) -->
      <path d="M 0 8 Q 60 12 120 24 Q 200 40 280 64 Q 360 92 440 120 L 504 138" fill="none" stroke="#E8B547" stroke-width="2"/>

      <!-- 曲线下填充(浅琥珀) -->
      <path d="M 0 8 Q 60 12 120 24 Q 200 40 280 64 Q 360 92 440 120 L 504 138 L 504 144 L 0 144 Z" fill="#E8B547" opacity="0.12"/>

      <!-- 当前工作点标记(mAP@0.5 区域) -->
      <rect x="280" y="64" width="6" height="6" fill="#4A9EFF" transform="rotate(45 283 67)"/>

      <!-- 轴标签 -->
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6B7280" text-rendering="geometricPrecision">
        <text x="-8" y="4" text-anchor="end">1.0</text>
        <text x="-8" y="76" text-anchor="end">0.5</text>
        <text x="-8" y="148" text-anchor="end">0.0</text>
        <text x="0" y="162">0.0</text>
        <text x="252" y="162" text-anchor="middle">0.5</text>
        <text x="504" y="162" text-anchor="middle">1.0</text>
      </g>

      <!-- 轴名 -->
      <text x="252" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9CA3AF" text-anchor="middle">recall</text>
      <text x="-32" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9CA3AF" text-anchor="middle" transform="rotate(-90 -32 72)">precision</text>
    </g>
  </g>

  <!-- 底部数据来源 -->
  <text x="600" y="302" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7280" text-anchor="middle">source: Ultralytics yolov5s COCO val 2017 evaluation</text>
</svg>
