<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">YOLOv5 目标检测实训</title>
  <desc id="hero-desc">基于 YOLOv5 的多场景图片目标检测实践,使用 yolov5s 预训练权重,包含街道、室内、自然等场景的检测结果可视化。右侧为典型检测框阵列示意,包含类别标签与置信度。</desc>

  <!-- 画布背景 -->
  <rect width="1200" height="360" fill="#0B0F14" rx="26"/>

  <!-- 细微网格底纹(模拟标注画布) -->
  <g stroke="#1A1F26" stroke-width="1" opacity="0.7">
    <line x1="56" y1="300" x2="1144" y2="300"/>
  </g>

  <!-- 左侧:标题区 -->
  <g transform="translate(56 60)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6B7280" letter-spacing="1.4">YOLOv5 OBJECT DETECTION LAB</text>
    <text x="0" y="58" font-size="46" font-weight="700" fill="#E8E4D9" letter-spacing="-0.5">YOLOv5 目标检测实训</text>
    <text x="0" y="94" font-size="18" fill="#9CA3AF">多场景图片检测 - yolov5s 预训练权重 - 结果可视化</text>
    <text x="0" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#E8B547">Python 3.13  ·  PyTorch  ·  Ultralytics  ·  COCO 80 类</text>
  </g>

  <!-- 右侧:检测框阵列 motif(模拟一张被检测的街景图) -->
  <g transform="translate(720 40)">
    <!-- 图像帧 -->
    <rect width="424" height="280" rx="4" fill="#1A1F26" stroke="#2A2F36" stroke-width="1"/>

    <!-- 场景暗示色块(模拟照片内容) -->
    <rect x="0" y="200" width="424" height="80" fill="#14181E"/>
    <rect x="0" y="200" width="424" height="80" fill="#1D2229" opacity="0.5"/>
    <line x1="0" y1="200" x2="424" y2="200" stroke="#2A2F36" stroke-width="1" opacity="0.6"/>
    <rect x="40" y="120" width="60" height="80" fill="#1D2229" opacity="0.45"/>
    <rect x="280" y="130" width="80" height="70" fill="#1D2229" opacity="0.45"/>
    <rect x="180" y="100" width="50" height="100" fill="#161A20" opacity="0.6"/>

    <!-- 检测框 1: person -->
    <rect x="36" y="44" width="68" height="156" fill="none" stroke="#E8B547" stroke-width="1.6"/>
    <rect x="36" y="28" width="86" height="16" fill="#4A9EFF"/>
    <text x="42" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#FFFFFF" text-rendering="geometricPrecision">person 0.87</text>

    <!-- 检测框 2: car -->
    <rect x="160" y="92" width="104" height="108" fill="none" stroke="#E8B547" stroke-width="1.6"/>
    <rect x="160" y="76" width="64" height="16" fill="#4A9EFF"/>
    <text x="166" y="88" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#FFFFFF" text-rendering="geometricPrecision">car 0.92</text>

    <!-- 检测框 3: dog -->
    <rect x="296" y="132" width="84" height="68" fill="none" stroke="#E8B547" stroke-width="1.6"/>
    <rect x="296" y="116" width="58" height="16" fill="#4A9EFF"/>
    <text x="302" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#FFFFFF" text-rendering="geometricPrecision">dog 0.78</text>

    <!-- 帧编号 -->
    <text x="396" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6B7280" text-anchor="end">runs/detect/exp</text>
  </g>

  <!-- 底部技术栈条 -->
  <text x="56" y="338" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6B7280">yolov5s.pt  ·  NMS  ·  CSPDarknet + PANet  ·  640 input</text>
</svg>
